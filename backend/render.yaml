services:
  - type: web
    name: pdf-chat-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # This means you'll enter it manually (keeps it secret)
      - key: PYTHON_VERSION
        value: 3.11.0